name: 'Enterprise CI/CD Engine'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }} # Consolidated to use your working prod client identity
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  quality_gates:
    name: '🛡️ 1. Quality Gates'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      # Gate A: Enforce file formatting uniformity
      - name: Code Format Validation
        run: terraform fmt -check -recursive

      # Gate B: Static Code Analysis & Syntax checks
      - name: Install and Run TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.48.0
      - name: Initialize and Execute TFLint
        run: |
          tflint --init
          tflint

  functional_testing:
    name: '🧪 2. Terratest Execution'
    needs: quality_gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: hashicorp/setup-terraform@v3

      - name: Log into Sandbox Identity
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

    
        # Completely eliminates web curl downlinks and local errors by building the environment inline
      - name: Execute Terratest Blueprint Test
        env:
          GOPROXY: "https://golang.org,direct"
        run: |
          cd test
          rm -f infra_test.go
          
          # 1. Re-generate a pristine Go file inline using standard shell characters
          cat << 'EOF' > infra_test.go
          package test
          
          import (
          	"testing"
          
          	"://github.com"
          	"://github.com"
          	"://github.com"
          )
          
          func TestEnterprisePipelineDeployment(t *testing.T) {
          	t.Parallel()
          
          	terraformOptions := terraform.WithDefaultRetryableErrors(t, &terraform.Options{
          		TerraformDir: "../",
          	})
          
          	defer terraform.Destroy(t, terraformOptions)
          
          	terraform.InitAndApply(t, terraformOptions)
          
          	rgName := terraform.Output(t, terraformOptions, "resource_group_name")
          
          	exists := azure.ResourceGroupExists(t, rgName, "")
          	assert.True(t, exists, "The target enterprise resource group was not provisioned successfully.")
          }
          EOF
          
          # 2. Build the exact package mappings locally on the runner machine
          go mod init test
          go mod edit -require=://github.com
          go mod edit -require=://github.com
          go mod tidy
          
          # 3. Launch the automated validation suite
          go test -v -timeout 45m



  drift_and_preview:
    name: '🔍 3. Drift Check & Plan'
    needs: functional_testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Workspace Initialization
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-terraform-backend" \
            -backend-config="storage_account_name=ravitejatfstatebackend" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate"

      # Gate D: Plan Drift Detection Setup (-refresh-only)
      - name: Evaluate Cloud Drift Configuration
        id: drift_check
        continue-on-error: true
        run: |
          terraform plan -detailed-exitcode -refresh-only
          echo "exit_status=$?" >> $GITHUB_OUTPUT

      # Generates alert annotations if someone manually edited the cloud resources
      - name: Emit Drift Warnings
        if: steps.drift_check.outputs.exit_status == '2'
        run: echo "::warning title=Drift Detected::The current cloud infrastructure states deviate from source code parameters!"

      - name: Generate Target Deployment Plan
        run: terraform plan -no-color

  deploy:
    name: '🚀 4. Production Release'
    needs: drift_and_preview
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
      
      - name: Initialization
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-terraform-backend" \
            -backend-config="storage_account_name=ravitejatfstatebackend" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=prod.terraform.tfstate"

      - name: Enforce Final Configuration Build
        run: terraform apply -auto-approve
